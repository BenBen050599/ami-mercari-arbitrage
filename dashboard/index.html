        let items = [];

        // 初始化
        function init() {
            items = EMBEDDED_DATA.items || [];
            updateUI();
        }

        function updateUI() {
            // 更新统计
            document.getElementById('totalCount').textContent = items.length;

            if (items.length > 0) {
                const prices = items.map(i => i.sale_price).filter(p => p > 0);
                document.getElementById('minPrice').textContent = '¥' + Math.min(...prices).toLocaleString();
                document.getElementById('maxPrice').textContent = '¥' + Math.max(...prices).toLocaleString();
                document.getElementById('avgPrice').textContent = '¥' + Math.round(prices.reduce((a,b) => a+b, 0) / prices.length).toLocaleString();

                // 更新时间
                document.getElementById('lastUpdate').textContent = EMBEDDED_DATA.timestamp || '--';
            }

            // 渲染表格
            renderTable(items);

            // 渲染图表
            renderChart();
        }

        function renderTable(data) {
            const tbody = document.getElementById('itemsTable');
            tbody.innerHTML = data.map((item, idx) => `
                <tr class="border-b border-gray-700 hover:bg-gray-750">
                    <td class="py-3 px-2 text-gray-400">${idx + 1}</td>
                    <td class="py-3 px-2">
                        <div class="font-medium">${item.name || '-'}</div>
                        <div class="text-xs text-gray-500">${item.id || '-'}</div>
                    </td>
                    <td class="py-3 px-2 text-right text-green-400 font-mono">¥${(item.sale_price || 0).toLocaleString()}</td>
                    <td class="py-3 px-2 text-right text-gray-400 font-mono">¥${(item.original_price || 0).toLocaleString()}</td>
                    <td class="py-3 px-2 text-center">
                        <span class="px-2 py-1 rounded text-xs ${getConditionClass(item.condition)}">${item.condition || 'B'}</span>
                    </td>
                    <td class="py-3 px-2">
                        <a href="${item.url}" target="_blank" class="text-blue-400 hover:text-blue-300 text-sm">查看</a>
                    </td>
                </tr>
            `).join('');
        }

        function getConditionClass(cond) {
            const classes = {
                'A': 'bg-green-600',
                'B': 'bg-yellow-600',
                'C': 'bg-red-600'
            };
            return classes[cond] || 'bg-gray-600';
        }

        function sortItems(type) {
            let sorted = [...items];
            if (type === 'price_asc') {
                sorted.sort((a, b) => a.sale_price - b.sale_price);
            } else if (type === 'price_desc') {
                sorted.sort((a, b) => b.sale_price - a.sale_price);
            } else if (type === 'name') {
                sorted.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
            }
            renderTable(sorted);
        }

        function renderChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');

            // 价格分布
            const ranges = [
                { label: '¥0-1k', min: 0, max: 1000 },
                { label: '¥1-3k', min: 1000, max: 3000 },
                { label: '¥3-5k', min: 3000, max: 5000 },
                { label: '¥5-10k', min: 5000, max: 10000 },
                { label: '¥10-20k', min: 10000, max: 20000 },
                { label: '¥20k+', min: 20000, max: 999999 }
            ];

            const counts = ranges.map(r =>
                items.filter(i => i.sale_price >= r.min && i.sale_price < r.max).length
            );

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ranges.map(r => r.label),
                    datasets: [{
                        label: '商品数量',
                        data: counts,
                        backgroundColor: [
                            '#22c55e',
                            '#84cc16',
                            '#eab308',
                            '#f97316',
                            '#ef4444',
                            '#dc2626'
                        ],
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#374151' },
                            ticks: { color: '#9ca3af' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#9ca3af' }
                        }
                    }
                }
            });
        }

        // 启动
        init();
    </script>
</body>
</html>
