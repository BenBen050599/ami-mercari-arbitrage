name: Daily Arbitrage Scan

on:
  schedule:
    - cron: '0 1 * * *'   # 每天 JST 10:00 (UTC 01:00)
  workflow_dispatch:        # 手动触发

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install beautifulsoup4 requests
          pip install git+https://github.com/marvinody/mercari.git

      - name: Run arbitrage scan
        run: python3 src/main.py

      - name: Generate dashboard
        run: python3 -c "import sys; sys.path.insert(0,'.'); from src.dashboard import generate; generate()"

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "Daily scan $(date +'%Y-%m-%d')"
          git push
